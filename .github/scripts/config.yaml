# ==================== General TTS (arXiv broad search) ====================
general_tts:
  keywords:
    TTS:
      filters:
        - "TTS"
        - "Text to speech"
        - "Speech Synthesis"
        - "Voice Synthesis"
        - "Speech Generation"
        - "Neural Speech Synthesis"
        - "Neural TTS"
    Multilingual_TTS:
      filters:
        - "multilingual TTS"
        - "zero-shot voice cloning"
        - "cross-lingual TTS"
    Low_Resource_Speech:
      filters:
        - "low-resource speech synthesis"
        - "low resource TTS"
        - "under-resourced TTS"
    Code_Switching:
      filters:
        - "code-switching TTS"
        - "code-mixed speech synthesis"
        - "bilingual TTS"
    Accent_Dialect:
      filters:
        - "accent adaptation TTS"
        - "dialect TTS"
        - "diglossia speech synthesis"

  # ---- Initial backfill (first run) ----
  days_back_initial: 2500         # roughly from 2019-01-01
  max_results_initial: 300        # fetch many papers per query

  # ---- Daily updates ----
  days_back_daily: 7
  max_results_daily: 10

# ==================== HuggingFace ====================
huggingface:
  model_terms:
    - "tamil tts"
    - "multilingual tts"
    - "indic tts"
    - "low-resource tts"
    - "text-to-speech tamil"
    - "singapore tts"
    - "code-switching tts"
  dataset_terms:
    - "tamil speech"
    - "singapore speech"
    - "tamil tts dataset"
    - "low-resource speech dataset"
    - "code-switching speech"
    - "indic speech dataset"
    - "multilingual tts dataset"

# ==================== GitHub ====================
github_queries:
  - "TTS Tamil"
  - "singapore tts"
  - "low-resource tts"
  - "tamil speech dataset"
  - "OmniVoice TTS"
  - "indic tts"
  - "multilingual speech synthesis"

# ==================== LLM Relevance Filter ====================
use_llm: true
llm_provider: "gemini"
llm_model: "gemini-1.5-flash"

# ==================== Output Pages ====================
output:
  main_readme: "README.md"
  tamil_page: "tamil-tts.md"
  repos_page: "repos.md"
